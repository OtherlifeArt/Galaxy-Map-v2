<!DOCTYPE html>
<html>
<head>
    <title>HTML Form</title>
    <!-- Style -->
    <link rel="stylesheet" href="form.css">
    <link href="../../vendor/select2/select2.min.css" rel="stylesheet" />
    <script src="../../vendor/jquery/jquery-3.7.1.min.js"></script>
    <script src="../../vendor/select2/select2.min.js"></script>
</head>
<body>
  <div id="search-container">
    <!-- Search -->
    <fieldset id="identity-fieldset">
      <legend>Find</legend>
      <label for="search">Search Object:</label>
      <input type="text" id="search" name="search" required>
    </fieldset>
    <fieldset id="identity-fieldset">
      <legend>Action</legend>
      <!-- Radio choices -->
      <input type="radio" id="create-object" name="crud" value="create" checked/>
      <label for="create-object">Create Object</label>
      <input type="radio" id="update-object" name="crud" value="update" />
      <label for="update-object">Update Object</label>
      <input type="radio" id="delete-object" name="crud" value="delete" />
      <label for="delete-object">Delete Object</label>
    </fieldset>
  </div>
  <div id="form-container">
    <!-- Form -->
    <form id="form">
      <fieldset id="identity-fieldset" form="form">
        <legend>Form</legend>
        <fieldset id="identity-fieldset" form="form">
          <legend>Identity</legend>
          <!-- Name -->
          <label for="name">Astronomical Object/Area Name:</label>
          <input type="text" id="name" name="name" required>
          <br>
          <!-- Continuity -->
          <label for="continuity">Continuity:</label>
          <select name="continuity" id="continuity" multiple required></select>
          <br>
          <!-- Ancestor -->
          <label for="ancestor-name">Ancestor Name:</label>
          <input type="text" id="ancestor-name" name="ancestor-name" required>
          <br>
        </fieldset>
        <fieldset id="characteristic-fieldset" form="form">
          <legend>Characteristics</legend>
          <!-- Type -->
          <label for="name">Type:</label>
          <select name="type" id="type" required></select>
          <br>
          <!-- Type Class -->
          <label for="name">Type Class:</label>
          <select name="type-class" id="type-class" multiple></select>
          <br>
        </fieldset>
        <fieldset id="location-fieldset" form="form">
          <legend>Location</legend>
          <!-- Coordinates -->
          Coordinates:
          <label for="x-coord">X:</label>
          <input type="number" id="x-coord" name="x-coord" required>
          <label for="y-coord">Y:</label>
          <input type="number" id="y-coord" name="y-coord" required>
          <label for="y-coord">Z:</label>
          <input type="number" id="z-coord" name="z-coord">
          <br>
          <!-- Dates -->
          Dates:
          <label for="date-from">From:</label>
          <input type="number" id="date-from" name="date-from">
          <label for="date-to">To:</label>
          <input type="number" id="date-to" name="date-to">
          <br>
        </fieldset>
        <fieldset id="external-data-fieldset" form="form">
          <legend>External References</legend>
          <!-- Urls -->
          <label for="urls">URLS:</label>
          <textarea name="urls" id="urls"></textarea>
          <br>
        </fieldset>
        <fieldset id="external-data-fieldset" form="form">
          <legend>Meta Data</legend>
          <!-- Placement certitude -->
          <label for="placement-certitude">Placement Certitude:</label>
          <select name="placement-certitude" id="placement-certitude" required></select>
          <br>
          <!-- Placement source -->
          <label for="sources">Sources:</label>
          <select name="sources" id="sources" multiple required></select>
          <br>
          <!-- Placement source -->
          <label for="notes">Notes:</label>
          <textarea name="notes" id="notes"></textarea>
          <br>
        </fieldset>
      </fieldset>
      <br>
      <input type="submit" value="Submit">
    </form>
  </div>
  <!-- Script -->
  <script src="form.js"></script>
</body>
</html>
